name: Auto PR from Staging

on:
  push:
    branches:
      - staging

jobs:
  create-pr:
    runs-on: self-hosted
    steps:
      - name: Create or update PR
        run: |
          EXISTING=$(/usr/bin/curl -sf \
            -H "Authorization: token ${{ secrets.PR_TOKEN }}" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/pulls?state=open&head=staging&base=main")

          if echo "$EXISTING" | grep -q '"number"'; then
            echo "Open PR already exists — skipping"
          else
            COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)

            /usr/bin/curl -sf -X POST \
              -H "Authorization: token ${{ secrets.PR_TOKEN }}" \
              -H "Content-Type: application/json" \
              "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/pulls" \
              -d "{
                \"title\": \"${COMMIT_MSG}\",
                \"head\": \"staging\",
                \"base\": \"main\",
                \"body\": \"Auto-created from push to staging.\n\nCommit: ${{ github.sha }}\"
              }"

            echo "PR created: ${COMMIT_MSG}"
          fi