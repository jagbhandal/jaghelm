name: Build and Deploy JagHelm

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Login to registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login registry.jagbhandal.com -u jagdeep.bhandal --password-stdin

      - name: Build and push
        run: |
          cd /opt/stacks/jaghelm && git pull origin main
          docker build -t registry.jagbhandal.com/jagdeep.bhandal/jaghelm:latest .
          docker push registry.jagbhandal.com/jagdeep.bhandal/jaghelm:latest

      - name: Deploy
        run: |
          cd /opt/stacks/jaghelm && docker compose up -d --force-recreate

      - name: Verify
        run: |
          sleep 10
          docker ps | grep jaghelm
          curl -s http://localhost:3099/api/health