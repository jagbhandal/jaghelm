name: Build and Deploy JagHelm

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login registry.jagbhandal.com -u jagdeep.bhandal --password-stdin

      - name: Build Docker image
        run: |
          docker build -t registry.jagbhandal.com/jagdeep.bhandal/jaghelm:latest -t registry.jagbhandal.com/jagdeep.bhandal/jaghelm:${{ github.sha }} .

      - name: Push to registry
        run: |
          docker push registry.jagbhandal.com/jagdeep.bhandal/jaghelm:latest
          docker push registry.jagbhandal.com/jagdeep.bhandal/jaghelm:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Pull and deploy
        run: |
          cd /opt/stacks/jaghelm && docker compose pull && docker compose up -d

      - name: Verify deployment
        run: |
          sleep 10
          docker ps | grep jaghelm && /usr/bin/curl -s http://localhost:3099/api/health