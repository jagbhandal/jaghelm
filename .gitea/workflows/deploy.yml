name: Build and Deploy JagHelm

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login registry.jagbhandal.com -u jagdeep.bhandal --password-stdin

      - name: Build Docker image
        run: |
          docker build -t registry.jagbhandal.com/jagdeep.bhandal/jaghelm:latest -t registry.jagbhandal.com/jagdeep.bhandal/jaghelm:${{ github.sha }} .

      - name: Push to registry
        run: |
          docker push registry.jagbhandal.com/jagdeep.bhandal/jaghelm:latest
          docker push registry.jagbhandal.com/jagdeep.bhandal/jaghelm:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Pull and deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/stacks/jaghelm && docker compose pull && docker compose up -d"

      - name: Verify deployment
        run: |
          sleep 10
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker ps | grep jaghelm && curl -s http://localhost:3099/api/health"