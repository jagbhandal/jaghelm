services:
  jaghelm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jaghelm
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - NODE_ENV=production
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
networks: {}